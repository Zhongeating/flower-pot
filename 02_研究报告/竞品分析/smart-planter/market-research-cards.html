    const categories = ["全部", "成熟", "众筹", "概念", "专业", "娱乐"];
    const toolbar = document.getElementById("toolbar");
    const cardsGrid = document.getElementById("cardsGrid");

    function createFilterButtons() {
      categories.forEach((cat, index) => {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (index === 0 ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderCards(cat);
        });
        toolbar.appendChild(btn);
      });
    }

    function renderCards(filter) {
      cardsGrid.innerHTML = "";
      const list = filter === "全部" ? products : products.filter((item) => item.category === filter);

      list.forEach((item) => {
        const card = document.createElement("article");
        card.className = "card";
        const imageUrl = imageMap[item.id];

        const mediaHtml = imageUrl
          ? `<div class="card-media"><img src="${imageUrl}" alt="${item.name} 产品图" loading="lazy" referrerpolicy="no-referrer"></div>`
          : `<div class="card-media"><div class="img-placeholder">图片待补充 · ${item.name}</div></div>`;

        card.innerHTML = `
          ${mediaHtml}
          <div class="card-content">
            <div class="card-top">
              <span class="category">${item.category}</span>
              <span class="relevance">相关度：${item.relevance}</span>
            </div>
            <h2 class="name">${item.id}. ${item.name}</h2>
            <p class="desc">${item.desc}</p>
            <div class="kv">
              <div><b>亮点：</b>${item.highlight}</div>
              <div><b>定位：</b>${item.position}</div>
            </div>
            <div class="actions">
              <span class="tag">方向：${item.bias}</span>
              <a class="link-btn" href="${item.link}" target="_blank" rel="noopener noreferrer">打开链接</a>
            </div>
          </div>
        `;

        if (imageUrl) {
          const img = card.querySelector("img");
          img.addEventListener("error", () => {
            const media = img.parentElement;
            media.innerHTML = `<div class="img-placeholder">图片加载失败 · ${item.name}</div>`;
          });
        }

        cardsGrid.appendChild(card);
      });
    }

    createFilterButtons();
